<table class="data-table quiqqer-oauth-server-userclients-edit">
    <tr>
        <td>
            <label class="field-container">
                <div class="field-container-item" title="{{labelClientId}}">
                    {{labelClientId}}
                </div>
                <div class="field-container-field client-id">
                    {{clientId}}
                </div>
            </label>
        </td>
    </tr>
    <tr>
        <td>
            <label class="field-container">
                <div class="field-container-item" title="{{labelClientSecret}}">
                    {{labelClientSecret}}
                </div>
                <div class="field-container-field quiqqer-oauth-client-secret">
                    <span>{{clientSecret}}</span>
                </div>
            </label>
            <button type="button" class="quiqqer-oauth-client-secret-button" title="{{labelButtonGenerateSecret}}"><span class="fa fa-refresh"></span></button>
        </td>
    </tr>
    <tr>
        <td>
            <label class="field-container">
                <div class="field-container-item" title="{{labelClientSecretIsToken}}">
                    {{labelClientSecretIsToken}}
                </div>
                <div class="field-container-field">
                    <input type="checkbox" name="client_secret_is_token"/>
                    <span>{{textClientSecretIsToken}}</span>
                </div>
            </label>
            <div class="field-container-item-desc">
                {{{descriptionClientSecretIsToken}}}
            </div>
        </td>
    </tr>
    <tr>
        <td>
            <label class="field-container">
                <div class="field-container-item" title="{{labelCDate}}">
                    {{labelCDate}}
                </div>
                <div class="field-container-field client-cdate">
                    {{c_date}}
                </div>
            </label>
        </td>
    </tr>
    <tr>
        <td>
            <label class="field-container">
                <div class="field-container-item" title="{{labelName}}">
                    {{labelName}}
                </div>
                <input class="field-container-field" type="text" name="name" value="{{name}}"/>
            </label>
        </td>
    </tr>
    <tr>
        <td>
            <div class="field-container scope-settings">
                <div class="field-container-item" title="{{labelScopeSettings}}">
                    {{labelScopeSettings}}
                </div>
            </div>
        </td>
    </tr>
</table>
